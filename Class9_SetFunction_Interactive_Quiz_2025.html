    .quiz-area{margin-top:20px;display:grid;gap:14px}
    .card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px}

    .qtitle{font-weight:700;font-size:1.05rem}
    .options{margin-top:8px;display:grid;gap:10px}

    .toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px}

  {id:6,bloom:"Knowledge",q:"সমবায় (composition) ফাংশন কী?",opts:["দুটি ফাংশনের আউটপুট সমান","এক ফাংশনের আউটপুট অপর ফাংশনের ইনপুট","ফাংশনের যোগফল","কোনোটিই নয়"],ans:"b",

  {id:11,bloom:"Comprehension",q:"f(x)=2x+1, g(x)=x^2-4; f(g(x)) কত?",opts:["2x^2-7","2x^2+1","x^2-3","2x^2-5"],ans:"a",

  {id:12,bloom:"Comprehension",q:"ভেন চিত্রে তিন সেটের ক্ষেত্রে কয়টি পৃথক অঞ্চল হয়?",opts:["4","6","7","8"],ans:"d",

  {id:13,bloom:"Comprehension",q:"(A ∪ B)\(A ∩ B) কাকে নির্দেশ করে?",opts:["A\B","B\A","Symmetric Difference","কোনোটিই নয়"],ans:"c",

    exp:"A-এর প্রতিটি উপাদান B-তে উপস্থিত।",hint:"Subset সংজ্ঞা।"},
  {id:15,bloom:"Comprehension",q:"যদি A∩B=∅, তবে A ও B হলো—",opts:["Disjoint","Equal","Subset","Universal"],ans:"a",
    exp:"ছেদ শূন্য ⇒ পরস্পর বিযুক্ত।",hint:"কোনো সাধারণ উপাদান নেই।"},
  {id:16,bloom:"Comprehension",q:"U={1,2,3,4,5}, A={1,2}; তবে A’ কত?",opts:["{3,4,5}","{1,2}","{}","U"],ans:"a",
    exp:"Complement U\A={3,4,5}.",hint:"সার্বিক সেট থেকে A বাদ।"},
  {id:17,bloom:"Comprehension",q:"ঐক্যের সূত্র—",opts:["n(A∪B)=n(A)+n(B)-n(A∩B)","n(A∪B)=n(A)+n(B)","n(A∪B)=n(A)×n(B)","কোনোটিই নয়"],ans:"a",
    exp:"ডাবল কাউন্টিং এড়াতে ছেদ বিয়োগ।",hint:"Inclusion-Exclusion।"},
  {id:18,bloom:"Comprehension",q:"f:A→B, g:B→C হলে g∘f:A→C কী?",opts:["সমবায়","বিযুক্ত","সিমেট্রিক","কোনোটিই নয়"],ans:"a",
    exp:"g(f(x))—সমবায় ফাংশন।",hint:"Arrow chasing: A→B→C।"},

  {id:19,bloom:"Application",q:"A={1,2,3}, B={2,3,4}; A ∩ B=?",opts:["{1,2,3,4}","{2,3}","{1}","{}"],ans:"b",
    exp:"উভয়ে সাধারণ {2,3}.",hint:"ভেনের মাঝখান।"},
  {id:20,bloom:"Application",q:"f(x)=x^2-4; f(±2) কত?",opts:["0","-4","2","4"],ans:"a",
    exp:"f(2)=0, f(-2)=0.",hint:"দুইটিই শূন্য দেয়।"},
  {id:21,bloom:"Application",q:"f(x)=2x+1, g(x)=x^2-4; g(f(x)) কত?",opts:["(2x+1)^2-4","2x^2-3","(x^2+1)^2","(2x-1)^2"],ans:"a",

  {id:22,bloom:"Application",q:"f(x)=x^2; f(√5) কত?",opts:["5","25","√5","কোনোটিই নয়"],ans:"a",
    exp:"(√5)^2=5.",hint:"বর্গ প্রয়োগ।"},
  {id:23,bloom:"Application",q:"A={1,3,5}, B={2,4,6}; A ∪ B=?",opts:["{1,2,3,4,5,6}","{}","{1,3,5}","{2,4,6}"],ans:"a",
    exp:"সমস্ত স্বতন্ত্র উপাদান একত্রে।",hint:"উভয় বৃত্তের পূর্ণ অংশ।"},
  {id:24,bloom:"Application",q:"n(A)=10, n(B)=15, n(A∩B)=5; তবে n(A∪B)=?",opts:["30","25","20","15"],ans:"c",
    exp:"10+15-5=20.",hint:"Inclusion-Exclusion সূত্র।"},
  {id:25,bloom:"Application",q:"A={x∈N | x≤5}, B={x∈N | x<3}; A\B=?",opts:["{1,2}","{3,4,5}","{5}","{}"],ans:"b",
    exp:"A={1,2,3,4,5}, B={1,2} ⇒ A\B={3,4,5}.",hint:"A থেকে B-এর উপাদান বাদ।"},
  {id:26,bloom:"Application",q:"f(x)=2x; f(f(3)) কত?",opts:["6","12","3","18"],ans:"b",
    exp:"f(3)=6 ⇒ f(6)=12.",hint:"দ্বিগুণের ওপর আবার দ্বিগুণ।"},

  {id:27,bloom:"Analysis",q:"(A ∪ B)\(A ∩ B) সমান কী?",opts:["Symmetric Difference","Complement","Union","Intersection"],ans:"a",

  {id:29,bloom:"Analysis",q:"f:R→R, f(x)=x^2; f কি One–One?",opts:["হ্যাঁ","না","সবসময়","অজানা"],ans:"b",

  {id:30,bloom:"Analysis",q:"f(x)=x^2, g(x)=√x; g∘f(x) এর প্রকৃতি কী (R-এ)?",opts:["Identity","Onto but not One–one","One–one but not Onto","কোনোটিই নয়"],ans:"d",
    exp:"g(f(x))=|x|; R-এ এটি Identity নয়, One–one নয় এবং Onto-ও নয় (ঋণাত্মকগুলো অনুপস্থিত)।",hint:"ডোমেইন-রেঞ্জ স্পষ্ট করো।"}
];

// ----------------- QUIZ LOGIC -----------------
let quiz=[], score=0;
const letterToIndex={a:0,b:1,c:2,d:3};

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a;}
function makeDots(n){const d=document.getElementById('dots');d.innerHTML='';for(let i=0;i<n;i++){const e=document.createElement('div');e.className='dot';e.id='dot-'+i;d.appendChild(e);}}

function renderQuiz(){
  const area=document.getElementById('quizArea');
  area.innerHTML='';
  document.getElementById('total').textContent=quiz.length;
  score=0; document.getElementById('score').textContent=score;
  makeDots(quiz.length);

  quiz.forEach((q,idx)=>{
    const card=document.createElement('section'); card.className='card'; card.id='qcard-'+idx;
    card.innerHTML=`
      <div class="qhead">
        <div class="qtitle">Q${idx+1}. ${q.q}</div>
        <div class="qmeta">
          <span class="chip">${q.bloom}</span>
          <span class="chip">ID: ${q.id}</span>
        </div>
      </div>
      <div class="options" role="group" aria-label="বিকল্পসমূহ">
        ${q.opts.map((t,i)=>`
          <label class="opt" id="q${idx}-opt${i}">
            <input type="radio" name="q${idx}" value="${i}" aria-label="বিকল্প ${i+1}">
            <span>(${['a','b','c','d'][i]}) ${t}</span>
          </label>
        `).join('')}
      </div>
      <div class="toolbar">
        <button class="btn btn-outline" onclick="checkAnswer(${idx})">Check</button>
        <button class="btn btn-outline" onclick="clearSelection(${idx})">Clear</button>
      </div>
      <details class="summary-box hidden" id="exp-${idx}">
        <summary>ব্যাখ্যা ও নির্দেশ</summary>
        <div class="feedback"><strong>ব্যাখ্যা:</strong> ${q.exp}</div>
        <div class="feedback"><strong>ভিজ্যুয়াল নির্দেশ:</strong> ${q.hint}</div>
      </details>`;
    area.appendChild(card);
  });

  if (window.MathJax && window.MathJax.typeset) window.MathJax.typeset();
}

function clearSelection(idx){
  document.querySelectorAll(`input[name="q${idx}"]`).forEach(r=>r.checked=false);
  document.querySelectorAll(`#qcard-${idx} .opt`).forEach(el=>el.classList.remove('correct','wrong'));
  document.getElementById('exp-'+idx).classList.add('hidden');
  const dot=document.getElementById('dot-'+idx); dot.classList.remove('correct','wrong','answered');
}

function recalcScore(){
  let s=0;
  quiz.forEach((qq,ii)=>{
    const rr=document.querySelector(`input[name="q${ii}"]:checked`);
    if(!rr) return;
    if(parseInt(rr.value)===letterToIndex[qq.ans]) s++;
  });
  score=s; document.getElementById('score').textContent=score;
}

function checkAnswer(idx){
  const q=quiz[idx];
  const radios=document.querySelectorAll(`input[name="q${idx}"]`);
  let chosen=-1; radios.forEach((r,i)=>{if(r.checked) chosen=i;});
  if(chosen===-1) return;

  const ci=letterToIndex[q.ans];
  const opts=document.querySelectorAll(`#qcard-${idx} .opt`);
  opts.forEach((el,i)=>{
    el.classList.remove('correct','wrong');
    if(i===chosen && i===ci) el.classList.add('correct');
    else if(i===chosen && i!==ci) el.classList.add('wrong');
  });
  const dot=document.getElementById('dot-'+idx);
  dot.classList.remove('correct','wrong','answered');
  dot.classList.add(chosen===ci?'correct':'wrong');

  document.getElementById('exp-'+idx).classList.remove('hidden');
  recalcScore();
  if (window.MathJax && window.MathJax.typesetPromise) window.MathJax.typesetPromise();
}

function submitAll(){
  quiz.forEach((q,idx)=>{
    const rr=document.querySelector(`input[name="q${idx}"]:checked`);
    const ci=letterToIndex[q.ans];
    const dot=document.getElementById('dot-'+idx);
    if(!rr) dot.classList.add('answered'); else dot.classList.add(parseInt(rr.value)===ci?'correct':'wrong');
    document.getElementById('exp-'+idx).classList.remove('hidden');
  });
  recalcScore();
  if (window.MathJax && window.MathJax.typesetPromise) window.MathJax.typesetPromise();
}

function generateQuiz(){
  const level=document.getElementById('filterBloom').value;
  const numQ=Math.min(30,Math.max(1,parseInt(document.getElementById('numQ').value||'30')));
  let candidates=DATA.slice();
  if(level!=='all') candidates=candidates.filter(x=>x.bloom===level);
  if(document.getElementById('shuffle').checked) shuffle(candidates);
  quiz=candidates.slice(0,numQ);
  renderQuiz();
  setTimeout(()=>{
    quiz.forEach((q,idx)=>{
      document.querySelectorAll(`input[name="q${idx}"]`).forEach(r=>{
        r.addEventListener('change',()=>{
          if(document.getElementById('immediateCheck').checked) checkAnswer(idx);
          else document.getElementById('dot-'+idx).classList.add('answered');
        });
      });
    });
  },0);
}

function resetQuiz(){
  quiz=[];
  document.getElementById('quizArea').innerHTML='';
  document.getElementById('score').textContent=0;
  document.getElementById('total').textContent=0;
  document.getElementById('dots').innerHTML='';
}

document.getElementById('btnGenerate').addEventListener('click',generateQuiz);
document.getElementById('btnSubmitAll').addEventListener('click',submitAll);
document.getElementById('btnReset').addEventListener('click',resetQuiz);
document.getElementById('btnPrint').addEventListener('click',()=>window.print());

// init
generateQuiz();
</script>
</body>
</html>
