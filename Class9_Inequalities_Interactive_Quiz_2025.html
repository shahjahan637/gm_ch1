  <meta name="description" content="অধ্যায় ৬: অসমতা — MCQ, ব্যাখ্যা ও লেখচিত্র নির্দেশসহ ইন্টারঅ্যাকটিভ কুইজ" />
  <style>
    :root {
      --bg: #0f172a;         /* slate-900 */
      --card: #111827;       /* gray-900 */
      --muted: #94a3b8;      /* slate-400 */
      --text: #e5e7eb;       /* gray-200 */
      --accent: #22c55e;     /* green-500 */
      --accent-2: #60a5fa;   /* blue-400 */
      --danger: #f87171;     /* red-400 */
      --warning: #fbbf24;    /* amber-400 */
      --chip: #1f2937;       /* gray-800 */
      --chip-border: #374151;/* gray-700 */
      --border: #1f2937;
      --shadow: 0 10px 25px rgba(0,0,0,.35);
      --radius: 16px;
    }
    html, body {
      margin:0; padding:0;
      background: var(--bg);
      color: var(--text);
      font-family: "Noto Sans Bengali", "Nirmala UI", "SolaimanLipi", system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Apple Color Emoji", "Segoe UI Emoji", sans-serif;
      line-height: 1.6;
    }
    .container {
      max-width: 1100px;
      margin: 24px auto;
      padding: 0 16px;
    }
    header {
      background: linear-gradient(90deg, rgba(34,197,94,.15), rgba(96,165,250,.15));
      padding: 20px 16px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }
    h1 {
      margin: 0 0 6px 0;
      font-size: clamp(1.25rem, 2.5vw, 1.75rem);
      letter-spacing:.2px;
    }
    .meta {
      color: var(--muted);
      font-size: .95rem;
      display:flex; gap:12px; flex-wrap: wrap;
    }
    .controls {
      margin-top: 16px;
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 12px;
    }
    .control {
      grid-column: span 12;
      background: var(--card);
      border: 1px solid var(--border);
      padding: 12px;
      border-radius: 12px;
      display:flex; align-items:center; gap:10px; flex-wrap:wrap;
    }
    @media (min-width: 720px) {
      .control.cols-6 { grid-column: span 6; }
      .control.cols-3 { grid-column: span 3; }
      .control.cols-4 { grid-column: span 4; }
    }
    select, input[type="number"], button {
      background:#0b1220;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 0.95rem;
    }
    .btn {
      cursor: pointer;
      transition: transform .05s ease, box-shadow .2s ease, background .2s ease;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
    }
    .btn:hover { transform: translateY(-1px); }
    .btn-primary { background: linear-gradient(90deg, rgba(34,197,94,.9), rgba(96,165,250,.9)); border:none; }
    .btn-outline { background: transparent; }
    .btn-danger { background: rgba(248,113,113,.15); border-color: #ef4444; }
    .chip {
      display:inline-flex; align-items:center; gap:8px;
      background: var(--chip);
      border:1px solid var(--chip-border);
      border-radius: 999px;
      padding: 6px 10px;
      font-size: .85rem;
    }
    .quiz-area {
      margin-top: 20px;
      display:grid;
      gap:14px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 16px;
    }
    .qhead {
      display:flex; justify-content:space-between; gap:10px; align-items:flex-start; flex-wrap:wrap;
    }
    .qtitle {
      font-weight: 700; font-size: 1.05rem;
    }
    .qmeta {
      display:flex; gap:8px; flex-wrap:wrap;
    }
    .options {
      margin-top: 8px; display:grid; gap:10px;
    }
    .opt {
      display:flex; gap:10px; align-items: flex-start;
      border: 1px solid var(--border);
      border-radius: 12px; padding: 10px;
      background:#0b1220;
    }
    .opt.correct { border-color: #16a34a; background: rgba(22,163,74,.08); }
    .opt.wrong { border-color: #ef4444; background: rgba(239,68,68,.08); }
    .feedback {
      margin-top: 10px; padding: 10px; border-radius: 12px;
      background: #071426; border:1px solid #0f2747;
    }
    .feedback .ok { color: var(--accent); font-weight:700; }
    .feedback .bad { color: var(--danger); font-weight:700; }
    .toolbar {
      display:flex; flex-wrap: wrap; gap:10px; margin-top: 10px;
    }
    .progress {
      margin-top: 14px; padding: 12px; border:1px dashed var(--chip-border);
      border-radius: 12px; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px;
      background: #0b1220;
    }
    .dots { display:flex; gap:6px; flex-wrap: wrap; }
    .dot {
      width: 12px; height: 12px; border-radius: 50%;
      background:#334155; border:1px solid #475569;
    }
    .dot.correct { background:#16a34a; border-color:#16a34a; }
    .dot.wrong { background:#ef4444; border-color:#ef4444; }
    .dot.answered { background:#0284c7; border-color:#0284c7; }
    footer {
      opacity:.8; color: var(--muted);
      margin: 28px 0 16px 0; text-align:center; font-size:.9rem;
    }
    details.summary-box {
      margin-top: 10px;
      background: #0b1220;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 12px;
    }
    details.summary-box > summary {
      cursor: pointer;
      font-weight: 700;
      color: var(--accent-2);
    }
    .hidden { display:none !important; }
  </style>

<script>
// ---- Data (30 MCQs) ----
const DATA = [
  {id:1, bloom:"Knowledge", q:"\(3x + 5 > 2x + 8\) এর সমাধান কী?", opts:["\(x > 3\)","\(x < 3\)","\(x \ge 3\)","\(x \le 3\)"], ans:"a",
    exp:"উভয় পাশে \(2x\) বিয়োগ করলে: \(x+5>8\) ⇒ \(x>3\)। সংখ্যা রেখায় 3-এর ডানদিকে খোলা বৃত্তসহ।",
    hint:"সংখ্যা রেখায় 3 এ খোলা বৃত্ত, ডানে তীর।"},
  {id:2, bloom:"Knowledge", q:"\(2x - 7 \le 3x + 1\) ⇒ সমাধান:", opts:["\(x \ge -8\)","\(x \le -8\)","\(x \ge 8\)","\(x \le 8\)"], ans:"a",
    exp:"উভয় পাশে \(2x\) বিয়োগ: \(-7 \le x+1\) ⇒ \(x \ge -8\)। ‘≤/≥’ চিহ্ন সমানতাও মেনে চলে।",
    hint:"-8 এ বন্ধ বৃত্ত, ডানে তীর।"},
  {id:3, bloom:"Knowledge", q:"\(-2 < 3x + 1 < 10\) ⇒ সমাধান কী?", opts:["\(-1 < x < 3\)","\(-3 < x < 9\)","\(1 < x < 2\)","\(x > 3\)"], ans:"a",
    exp:"যুগপৎ: \(-2-1<3x<10-1\) ⇒ \(-3<3x<9\) ⇒ ভাগ 3: \(-1<x<3\)।",
    hint:"-1 ও 3—দুই প্রান্তেই খোলা বৃত্ত; মাঝখান রঙিন।"},
  {id:4, bloom:"Knowledge", q:"\(x+5 > 8\) এর গ্রাফ শুরু হবে—", opts:["\(x=3\) এর ডানে","\(x=3\) এর বামে","\(x=8\) এর ডানে","\(x=-3\) এর ডানে"], ans:"a",
    exp:"\(x+5>8\) ⇒ \(x>3\)। গ্রাফ \(x=3\) থেকে ডানে।",
    hint:"3-এ খোলা বৃত্ত, ডানে তীর।"},
  {id:5, bloom:"Knowledge", q:"যদি \(ax+b > cx+d\), তবে \(x\)-এর গুণিতক উভয় পাশে একসাথে বাদ দিলে কী হয়?", opts:["সমাধান পরিবর্তন হয়","সমাধান অপরিবর্তিত থাকে","অসমতা বাতিল হয়","কোনোটিই নয়"], ans:"b",
    exp:"একই রাশি যোগ-বিয়োগ করলে অসমতার দিক বদলায় না; তাই সমাধান অপরিবর্তিত।",
    hint:"সমমান অপারেশন সমাধান অপরিবর্তিত রাখে।"},
  {id:6, bloom:"Knowledge", q:"যুগপৎ অসমতার গ্রাফ কেমন হয়?", opts:["রেখাংশ","দুটি আলাদা রেখা","একটি সংখ্যা রেখার নির্দিষ্ট অংশ","বৃত্ত"], ans:"c",
    exp:"যুগপৎ অসমতার গ্রাফ সংখ্যা রেখার একটি নির্দিষ্ট অংশ/ইন্টারভ্যাল।",
    hint:"দুই শর্তের ছেদ অংশ।"},
  {id:7, bloom:"Knowledge", q:"\(2x - 3 < 7\) ⇒ সমাধান কী?", opts:["\(x < 5\)","\(x > 5\)","\(x \le 5\)","\(x \ge 5\)"], ans:"a",
    exp:" \(2x-3<7\) ⇒ \(2x<10\) ⇒ \(x<5\)।",
    hint:"5-এ খোলা বৃত্ত, বামে তীর।"},
  {id:8, bloom:"Knowledge", q:"\( -4 \le 2x \le 6\) ⇒ সমাধান কী?", opts:["\(-2 \le x \le 3\)","\(-3 \le x \le 2\)","\(x \ge 2\)","\(x \le -2\)"], ans:"a",
    exp:" \(-4 \le 2x \le 6\) ⇒ ভাগ 2: \(-2 \le x \le 3\)।",
    hint:"-2 ও 3—দুই প্রান্তেই বন্ধ বৃত্ত।"},
  {id:9, bloom:"Knowledge", q:"সংখ্যা রেখায় \(x > a\) কিভাবে প্রকাশিত হয়?", opts:["\(a\) থেকে বামে তীরচিহ্ন","\(a\) থেকে ডানে তীরচিহ্ন","দুইদিকে তীরচিহ্ন","বৃত্তাকার চিহ্ন"], ans:"b",
    exp:" \(x>a\) মানে \(a\) থেকে ডানে অসীমের দিকে।",
    hint:"a-এ খোলা বৃত্ত, ডানে তীর।"},

  {id:10, bloom:"Comprehension", q:"\(5x - 2 \ge 3x + 6\) এর সমাধান হলো—", opts:["\(x \ge 4\)","\(x \le 4\)","\(x > -4\)","\(x < -4\)"], ans:"a",
    exp:" \(5x-2\ge 3x+6\) ⇒ \(2x\ge 8\) ⇒ \(x\ge 4\)।",
    hint:"4-এ বন্ধ বৃত্ত, ডানে তীর।"},
  {id:11, bloom:"Comprehension", q:"যদি \(-2 < x < 5\), তবে সংখ্যারেখায় এটি কোন ধরনের অংশ নির্দেশ করবে?", opts:["অসীম রেখা","সীমাবদ্ধ রেখাংশ","একপাশে খোলা রেখা","উভয়পাশে অসীম রেখা"], ans:"b",
    exp:" \(-2<x<5\) হলো সীমাবদ্ধ ইন্টারভ্যাল; দুই প্রান্ত খোলা।",
    hint:"-2, 5-এ খোলা বৃত্ত; মাঝখান রঙিন।"},
  {id:12, bloom:"Comprehension", q:"\(2(x-1) < 4\) ⇒ সমাধান?", opts:["\(x < 3\)","\(x > 3\)","\(x \le 3\)","\(x \ge 3\)"], ans:"a",
    exp:" \(2(x-1)<4\) ⇒ \(2x-2<4\) ⇒ \(2x<6\) ⇒ \(x<3\)।",
    hint:"3-এ খোলা বৃত্ত, বামে তীর।"},
  {id:13, bloom:"Comprehension", q:"\(-1 < 2x + 1 < 7\) ⇒ সমাধান কী?", opts:["\(-1 < x < 3\)","\(-2 < x < 4\)","\(0 < x < 2\)","\(-1 < x < 2\)"], ans:"a",
    exp:" \(-1<2x+1<7\) ⇒ \(-2<2x<6\) ⇒ \(-1<x<3\)।",
    hint:"-1, 3-এ খোলা বৃত্ত।"},
  {id:14, bloom:"Comprehension", q:"\(3x - 7 \le 2x - 4\) ⇒ সমাধান কী?", opts:["\(x \le 3\)","\(x \ge 3\)","\(x \le -3\)","\(x \ge -3\)"], ans:"a",
    exp:" \(3x-7\le 2x-4\) ⇒ \(x\le 3\)।",
    hint:"3-এ বন্ধ বৃত্ত, বামে তীর।"},
  {id:15, bloom:"Comprehension", q:"যদি \(ax > bx\) এবং \(a>b\), তবে—", opts:["\(x > 0\)","\(x < 0\)","\(x=0\)","সবসময় সত্য"], ans:"a",
    exp:" \((a-b)x>0\) এবং \(a-b>0\) ⇒ \(x>0\)।",
    hint:"চিহ্ন-নিয়ম: ধনাত্মক দিয়ে ভাগে দিক অপরিবর্তিত।"},
  {id:16, bloom:"Comprehension", q:"\( -6 \le 2x - 4 \le 2\) ⇒ সমাধান কী?", opts:["\(-1 \le x \le 3\)","\(-2 \le x \le 4\)","\(1 \le x \le 2\)","\(-5 \le x \le 1\)"], ans:"a",
    exp:" \(-6\le 2x-4\le 2\) ⇒ \(-2\le 2x\le 6\) ⇒ \(-1\le x\le 3\)।",
    hint:"-1 ও 3-এ বন্ধ বৃত্ত।"},
  {id:17, bloom:"Comprehension", q:"অসমতা \(|x| < 3\) এর গ্রাফ কেমন হবে?", opts:["\(-3 < x < 3\)","\(x > 3\)","\(x < -3\)","সবগুলো"], ans:"a",
    exp:" \(|x|<3\) ⇒ \(-3<x<3\)।",
    hint:"-3 ও 3-এ খোলা বৃত্ত।"},
  {id:18, bloom:"Comprehension", q:"\(7 - 2x > 1\) ⇒ সমাধান কী?", opts:["\(x < 3\)","\(x > 3\)","\(x \ge 3\)","\(x \le 3\)"], ans:"a",
    exp:" \(7-2x>1\) ⇒ \(-2x>-6\) ⇒ ভাগ \(-2\) ⇒ \(x<3\) (দিক উল্টো)।",
    hint:"ঋণাত্মক দিয়ে ভাগে দিক বদলায়।"},

  {id:19, bloom:"Application", q:"\(4x + 5 \le 9\) ⇒ সমাধান কী?", opts:["\(x \le 1\)","\(x \ge 1\)","\(x < 2\)","\(x > 2\)"], ans:"a",
    exp:" \(4x+5\le 9\) ⇒ \(4x\le 4\) ⇒ \(x\le 1\)।",
    hint:"1-এ বন্ধ বৃত্ত, বামে তীর।"},
  {id:20, bloom:"Application", q:"যদি \(-2 \le x < 4\), তবে কতগুলো পূর্ণসংখ্যা \(x\) এই শর্ত পূরণ করবে?", opts:["5","6","7","8"], ans:"b",
    exp:"পূর্ণসংখ্যা: -2,-1,0,1,2,3 ⇒ মোট 6টি।",
    hint:"প্রান্ত বন্ধ/খোলা লক্ষ্য করো।"},
  {id:21, bloom:"Application", q:"\(3(x+1) > 2(x+3)\) ⇒ সমাধান কী?", opts:["\(x > 3\)","\(x < 3\)","\(x > -3\)","\(x < -3\)"], ans:"a",
    exp:" \(3x+3>2x+6\) ⇒ \(x>3\)।",
    hint:"3-এ খোলা বৃত্ত, ডানে তীর।"},
  {id:22, bloom:"Application", q:"\(2x - 5 < x + 4\) ⇒ সমাধান কী?", opts:["\(x < 9\)","\(x > 9\)","\(x \le 9\)","\(x \ge 9\)"], ans:"a",
    exp:" \(2x-5<x+4\) ⇒ \(x<9\)।",
    hint:"9-এ খোলা বৃত্ত, বামে তীর।"},
  {id:23, bloom:"Application", q:"যদি \(x\) একটি পূর্ণসংখ্যা হয় এবং \(-1 < x < 5\), তবে কতটি পূর্ণসংখ্যা সম্ভব?", opts:["3","4","5","6"], ans:"c",

// --- State ---
let quiz = [];
let score = 0;

// Helpers
const letterToIndex = {'a':0,'b':1,'c':2,'d':3};

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function makeDots(n) {
  const dots = document.getElementById('dots');
  dots.innerHTML = '';
  for (let i=0; i<n; i++) {
    const d = document.createElement('div');
    d.className = 'dot';
    d.id = 'dot-' + i;
    dots.appendChild(d);
  }
}

function renderQuiz() {
  const area = document.getElementById('quizArea');
  area.innerHTML = '';
  document.getElementById('total').textContent = quiz.length;
  score = 0;
  document.getElementById('score').textContent = score;
  makeDots(quiz.length);

  quiz.forEach((q, idx) => {
    const card = document.createElement('section');
    card.className = 'card';
    card.id = 'qcard-' + idx;
    card.innerHTML = `
      <div class="qhead">
        <div class="qtitle">Q${idx+1}. ${q.q}</div>
        <div class="qmeta">
          <span class="chip" title="ব্লুম স্তর">${q.bloom}</span>
          <span class="chip">আইডি: ${q.id}</span>
        </div>
      </div>
      <div class="options" role="group" aria-label="বিকল্পসমূহ">
        ${q.opts.map((t,i)=>`
          <label class="opt" id="q${idx}-opt${i}">
            <input type="radio" name="q${idx}" value="${i}" aria-label="বিকল্প ${i+1}">
            <span>(${['a','b','c','d'][i]}) ${t}</span>
          </label>
        `).join('')}
      </div>
      <div class="toolbar">
        <button class="btn btn-outline" onclick="checkAnswer(${idx})">Check</button>
        <button class="btn btn-outline" onclick="clearSelection(${idx})">Clear</button>
      </div>
      <details class="summary-box hidden" id="exp-${idx}">
        <summary>ব্যাখ্যা ও লেখচিত্র নির্দেশ</summary>
        <div class="feedback"><span class="ok">ব্যাখ্যা:</span> ${q.exp}</div>
        <div class="feedback"><span class="ok">লেখচিত্র নির্দেশ:</span> ${q.hint}</div>
      </details>
    `;
    area.appendChild(card);
  });

  if (window.MathJax && window.MathJax.typeset) { window.MathJax.typeset(); }
}

function clearSelection(idx) {
  document.querySelectorAll(`input[name="q${idx}"]`).forEach(r => r.checked = false);
  document.querySelectorAll(`#qcard-${idx} .opt`).forEach(el=>el.classList.remove('correct','wrong'));
  document.getElementById('exp-'+idx).classList.add('hidden');
  const dot = document.getElementById('dot-'+idx);
  dot.classList.remove('correct','wrong','answered');
}

function checkAnswer(idx) {
  const q = quiz[idx];
  const radios = document.querySelectorAll(`input[name="q${idx}"]`);
  let chosen = -1;
  radios.forEach((r,i)=>{ if(r.checked) chosen = i; });
  if (chosen === -1) return;

  const correctIndex = letterToIndex[q.ans];
  const optElems = document.querySelectorAll(`#qcard-${idx} .opt`);

  optElems.forEach((el,i)=>{
    el.classList.remove('correct','wrong');
    if (i === chosen && i === correctIndex) el.classList.add('correct');
    else if (i === chosen && i !== correctIndex) el.classList.add('wrong');
  });

  const dot = document.getElementById('dot-'+idx);
  dot.classList.remove('answered','wrong','correct');
  if (chosen === correctIndex) {
    dot.classList.add('correct');
  } else {
    dot.classList.add('wrong');
  }

  // Update score: compute fresh every time
  let newScore = 0;
  quiz.forEach((qq, ii)=>{
    const rr = document.querySelector(`input[name="q${ii}"]:checked`);
    if (!rr) return;
    const ci = letterToIndex[qq.ans];
    if (parseInt(rr.value) === ci) newScore++;
  });
  score = newScore;
  document.getElementById('score').textContent = score;

  // Show explanation
  document.getElementById('exp-'+idx).classList.remove('hidden');
  if (window.MathJax && window.MathJax.typeset) { window.MathJax.typesetPromise(); }
}

function submitAll() {
  quiz.forEach((q,idx)=>{
    const radios = document.querySelectorAll(`input[name="q${idx}"]`);
    let chosen = -1;
    radios.forEach((r,i)=>{ if(r.checked) chosen = i; });
    const ci = letterToIndex[q.ans];
    const dot = document.getElementById('dot-'+idx);
    if (chosen === -1) {
      dot.classList.add('answered'); // attempted/seen
    } else if (chosen === ci) {
      dot.classList.add('correct');
    } else {
      dot.classList.add('wrong');
    }
    document.getElementById('exp-'+idx).classList.remove('hidden');
  });
  // recompute score
  let newScore = 0;
  quiz.forEach((qq, ii)=>{
    const rr = document.querySelector(`input[name="q${ii}"]:checked`);
    if (!rr) return;
    const ci = letterToIndex[qq.ans];
    if (parseInt(rr.value) === ci) newScore++;
  });
  score = newScore;
  document.getElementById('score').textContent = score;
  if (window.MathJax && window.MathJax.typeset) { window.MathJax.typesetPromise(); }
}

function generateQuiz() {
  const level = document.getElementById('filterBloom').value;
  const numQ = Math.min(30, Math.max(1, parseInt(document.getElementById('numQ').value || '30')));
  const doShuffle = document.getElementById('shuffle').checked;

  let candidates = DATA.slice();
  if (level !== 'all') candidates = candidates.filter(x => x.bloom === level);
  if (doShuffle) shuffle(candidates);
  quiz = candidates.slice(0, numQ);
  renderQuiz();

  // Immediate check: auto-check on option click
  setTimeout(()=>{
    quiz.forEach((q,idx)=>{
      document.querySelectorAll(`input[name="q${idx}"]`).forEach(r => {
        r.addEventListener('change', () => {
          if (document.getElementById('immediateCheck').checked) checkAnswer(idx);
          else {
            const dot = document.getElementById('dot-'+idx);
            dot.classList.add('answered');
          }
        });
      });
    });
  }, 0);
}

function resetQuiz() {
  quiz = [];
  document.getElementById('quizArea').innerHTML = '';
  document.getElementById('score').textContent = 0;
  document.getElementById('total').textContent = 0;
  document.getElementById('dots').innerHTML = '';
}

// Buttons
document.getElementById('btnGenerate').addEventListener('click', generateQuiz);
document.getElementById('btnSubmitAll').addEventListener('click', submitAll);
document.getElementById('btnReset').addEventListener('click', resetQuiz);
document.getElementById('btnPrint').addEventListener('click', ()=>window.print());

// Initial
generateQuiz();
</script>
